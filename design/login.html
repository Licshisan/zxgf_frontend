<script>
        function switchTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const registerBtn = document.getElementById('tab-register');
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');

            if (tab === 'login') {
                // Update tabs
                loginBtn.classList.add('text-primary', 'border-primary');
                loginBtn.classList.remove('text-on-surface-variant', 'border-transparent');
                registerBtn.classList.remove('text-primary', 'border-primary');
                registerBtn.classList.add('text-on-surface-variant', 'border-transparent');
                
                // Update forms
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                // Update tabs
                registerBtn.classList.add('text-primary', 'border-primary');
                registerBtn.classList.remove('text-on-surface-variant', 'border-transparent');
                loginBtn.classList.remove('text-primary', 'border-primary');
                loginBtn.classList.add('text-on-surface-variant', 'border-transparent');
                
                // Update forms
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }
    </script>
